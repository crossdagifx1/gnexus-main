name: CI - Quality Checks

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - develop

jobs:
  code-quality:
    name: 🔍 Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: 🔍 Run Type Check
        run: npm run type-check

      - name: 🧪 Run Tests
        run: npm run test
        continue-on-error: true

      - name: 🏗️ Test Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: ✅ All Checks Passed
        run: echo "✨ Code quality checks completed!"
